<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella+ - Login</title>

  <link rel="stylesheet" href="../css/login.css" />

  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />

  <!-- Scripts -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

  <link rel="icon" href="../img/logo.png" />
</head>

<body class="body-login">
  <main class="pagina-login">
    <section class="painel-animacao">
      <div class="animacao-conteudo">
        <img src="../img/logo.png" class="logo-animacao" />
      </div>
    </section>

    <!-- FORMULÁRIO -->
    <section class="painel-formulario">
      <div class="login-box">
        <div class="topo-login">
          <img src="../img/logo.png" alt="Bella+" class="logo-login" />
        </div>

        <!-- ABAS -->
        <div class="abas-login">
          <button class="aba-btn ativo" data-aba="login">Entrar</button>
          <button class="aba-btn" data-aba="cadastro">Cadastro</button>
        </div>

        <!-- LOGIN -->
        <section class="aba-conteudo ativo" id="aba-login">
          <h2>Entrar na conta</h2>

          <form class="formulario">
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Senha" required />
            <button class="btn-principal">Entrar</button>
          </form>

          <div class="divisor"><span>ou</span></div>

          <button class="btn-google">
            <img src="../img/google.png" />
            Entrar com Google
          </button>
          <br />
          <button class="btn-secundario btn-face" id="irParaFace" type="button">
            Reconhecimento facial
          </button>
          <button class="btn-link-recuperar" id="abrirRecuperar" type="button">
            Recuperar Senha
          </button>

          <div class="recuperar-box" id="recuperacaoBox">
            <h3>Recuperar acesso</h3>

            <form class="formulario" id="form-recuperar">
              <div class="grupo-campo">
                <label for="rec-email">Email</label>
                <input type="text" id="rec-email" placeholder="Digite seu Email" />
              </div>

              <button type="button" class="btn-principal" id="btnRecuperarEmail">
                Enviar recuperação de email
              </button>

              <div class="divisor"><span>ou</span></div>

              <div class="grupo-campo">
                <label for="rec-tel">Telefone</label>
                <input type="text" id="rec-tel" placeholder="(00) 0000-0000" />
              </div>

              <button type="button" class="btn-secundario" id="btnRecuperarTelefone">
                Enviar codigo para telefone
              </button>
            </form>
          </div>
        </section>
        <!-- CADASTRO -->
        <section class="aba-conteudo" id="aba-cadastro">
          <h2>Criar conta</h2>

          <form class="formulario">
            <div class="upload-foto">
              <label class="foto-preview">Adicionar Foto</label>
              <input type="file" />
            </div>

            <input type="text" placeholder="Nome completo" required />

            <div class="linha-2">
              <input type="text" placeholder="CPF" />
              <input type="text" id="dt-nascimento" placeholder="Nascimento" />
            </div>

            <div class="linha-2">
              <input type="email" placeholder="Email" required />
              <input type="tel" placeholder="Telefone" />
            </div>

            <input type="text" placeholder="CEP" />
            <input type="text" placeholder="Endereço" />

            <div class="linha-2">
              <input type="text" placeholder="Cidade" />
              <input type="text" placeholder="Estado" />
            </div>

            <input type="password" placeholder="Senha" required />
            <input type="password" placeholder="Confirmar senha" required />

            <button class="btn-principal">Cadastrar</button>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>

</html>
